name: Singularity Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # WINDOWS BUILD
          - platform: "windows-latest"
            args: ""

          # LINUX BUILD
          - platform: "ubuntu-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # --- LINUX DEPENDENCIES ---
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            flatpak \
            flatpak-builder

      # --- RUST SETUP ---
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}

      # --- NODE SETUP ---
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Frontend Dependencies
        run: npm install

      # --- MAIN BUILD, SIGN, AND UPLOAD ---
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Singularity ${{ github.ref_name }}"
          releaseBody: "Automatic release for version ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

      # =========================================================
      # WINDOWS SPECIFIC STEPS
      # =========================================================

      - name: Rename and Upload Portable (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          # Go to the build folder
          cd src-tauri/target/release/

          # Rename the raw file to include "Portable"
          mv Singularity.exe Singularity_Portable_${{ github.ref_name }}.exe
        shell: bash

      - name: Upload Portable Asset (Windows)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: src-tauri/target/release/Singularity_Portable_${{ github.ref_name }}.exe

      # =========================================================
      # LINUX SPECIFIC STEPS
      # =========================================================

      - name: Setup Flatpak Environment
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//49 org.gnome.Sdk//49

          export DCONF_PROFILE=/dev/null
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Prepare Flatpak Resources
        if: matrix.platform == 'ubuntu-latest'
        run: |
          chmod +x scripts/flatpak/copy-resources.sh
          scripts/flatpak/copy-resources.sh

      - name: Build Flatpak
        if: matrix.platform == 'ubuntu-latest'
        run: |
          chmod +x scripts/flatpak/build-flatpak.sh
          scripts/flatpak/build-flatpak.sh

          # List to verify it exists
          ls -lh SingularityMM.flatpak

      - name: Upload Flatpak Asset
        if: matrix.platform == 'ubuntu-latest'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: SingularityMM.flatpak
