name: Build Curated Mod List

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the 'data' branch.
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data

      # Step 2: Take the script folder from the 'main' branch.
      - name: Fetch script from main branch
        run: git checkout main -- .github/scripts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Run the script.
      # It will read 'mod_warnings.json' from the root and write to 'curated/curated_list.json'.
      - name: Run Script to Build List
        run: node .github/scripts/generate_curated_list.cjs
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

      # Step 4: Commit the result back to the 'data' branch.
      - name: Commit and push changes to the data branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-update curated mod list"
          # This action will automatically commit to the currently checked-out branch (data).
          file_pattern: curated/curated_list.json
