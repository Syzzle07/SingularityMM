name: Build Curated Mod List

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the 'data' branch.
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data

      # Step 2: Checkout the 'main' branch into a subdirectory named 'main_branch_files'.
      - name: Checkout main branch for script
        uses: actions/checkout@v4
        with:
          ref: main
          path: main_branch_files

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Run the script.
      # The script's working directory is still the root, so it can find 'mod_warnings.json'
      - name: Run Script to Build List
        run: node main_branch_files/.github/scripts/generate_curated_list.cjs
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

      # Step 4: Commit the generated 'curated/curated_list.json' file.
      # This action runs in the root of our workspace and commits to the 'data' branch.
      - name: Commit and push changes to the data branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-update curated mod list"
          file_pattern: curated/curated_list.json
